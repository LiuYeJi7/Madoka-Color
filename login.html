<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — BarberReserva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="brand-dot"></span> BarberReserva</a>
      <div class="nav-spacer"></div>
      <div id="nav-actions"></div>
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="card narrow">
      <h2>Iniciar sesión</h2>
      <p class="sub">Introduce tus credenciales para entrar.</p>

      <form id="login-form" novalidate>
        <div class="form-row">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="email" required />
          <div class="field-error" data-for="email"></div>
        </div>
        <div class="form-row">
          <label for="password">Contraseña</label>
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
          <div class="field-error" data-for="password"></div>
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Entrar</button>
      </form>
      <div class="divider"></div>
      <p class="muted center">¿No tienes cuenta? <a href="register.html">Crear una de cliente</a></p>
    </div>
  </main>

  <script src="shared.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('submit-btn');

    function setFieldError(name, msg) {
      const input = form.querySelector(`[name="${name}"]`);
      const err = form.querySelector(`.field-error[data-for="${name}"]`);
      if (msg) { input.classList.add('invalid'); err.textContent = msg; }
      else { input.classList.remove('invalid'); err.textContent = ''; }
    }
    form.querySelectorAll('input').forEach(i => i.addEventListener('input', () => setFieldError(i.name, '')));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError(form);
      setFieldError('email', ''); setFieldError('password', '');
      const email = form.email.value.trim();
      const password = form.password.value;
      let invalid = false;
      if (!email) { setFieldError('email', 'Introduce tu email.'); invalid = true; }
      if (!password) { setFieldError('password', 'Introduce tu contraseña.'); invalid = true; }
      if (invalid) return;

      btn.disabled = true; btn.textContent = 'Entrando…';
      try {
        const u = await DB.login({ email, password });
        const dest = u.role === 'admin' ? 'admin.html' : (u.role === 'employee' ? 'dashboard.html' : 'mis-reservas.html');
        location.href = dest;
      } catch (err) {
        btn.disabled = false; btn.textContent = 'Entrar';
        showError(form, err.message || 'No se pudo iniciar sesión.');
      }
    });
  </script>
</body>
</html>
